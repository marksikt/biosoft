<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AMOEBA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090b;--bg2:#0d1215;--bg3:#121a1e;
  --dim:#3d5060;--text:#a8bcc4;
  --hue:150;
  --glow:hsl(var(--hue),65%,55%);
  --glowfade:hsla(var(--hue),55%,40%,0.18);
  --font:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;user-select:none}
#app{height:100vh;display:grid;grid-template-rows:34px 1fr 24px 60px 30px;overflow:hidden}

/* header */
#hdr{display:flex;align-items:center;gap:7px;padding:0 10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--glow);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
#name-tag{flex:1;font-size:12px;color:var(--glow);font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stimulirow{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
#stimuli-bar{width:40px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
#stimuli-fill{height:100%;background:var(--glow);border-radius:2px;width:0%;transition:width .5s}

/* cell area */
#cell-area{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#cell-svg{width:100%;height:100%}

/* mutations strip */
#mut-strip{padding:0 8px;display:flex;align-items:center;gap:4px;overflow:hidden;border-top:1px solid rgba(255,255,255,0.04)}
.mbadge{font-size:10px;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,0.05);color:var(--dim);white-space:nowrap;animation:fadein .3s}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* conversation */
#convo{padding:5px 10px;overflow:hidden;display:flex;flex-direction:column;gap:3px;border-top:1px solid rgba(255,255,255,0.04)}
.cline{font-size:11px;line-height:1.45;opacity:.65;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cline.c{color:var(--glow);opacity:1}
.cline.e{color:var(--dim);font-style:italic}

/* controls */
#ctrl{display:flex;gap:5px;padding:5px 8px;border-top:1px solid rgba(255,255,255,0.04)}
#ctrl button{flex:1;background:none;border:1px solid rgba(255,255,255,0.09);color:var(--dim);
  padding:6px 2px;border-radius:4px;cursor:pointer;font:inherit;font-size:10px;
  text-transform:uppercase;letter-spacing:.09em;transition:all .15s;position:relative}
#ctrl button:hover{color:var(--glow);border-color:var(--glow);background:var(--glowfade)}
#ctrl button:disabled{opacity:.22;pointer-events:none}
#ctrl button.ready{color:var(--glow);border-color:var(--glow)}

/* tooltips on buttons */
#ctrl button[data-tip]{position:relative}
#ctrl button[data-tip]::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:#0d1215;border:1px solid rgba(255,255,255,.12);
  color:#9ab0b8;font-size:10px;padding:4px 8px;border-radius:4px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:500;font-family:'Courier New',monospace}
#ctrl button[data-tip]:hover::after{opacity:1}

/* dead state */
body.dead #cell-area{filter:grayscale(1) brightness(.4)}
body.dead #ctrl{opacity:.2;pointer-events:none}
body.dead .dot{animation:none;opacity:.3}

/* API key row — always visible */
#key-row{display:flex;align-items:center;gap:7px;padding:0 10px;border-top:1px solid rgba(255,255,255,0.04);font-size:11px;color:var(--dim)}
#key-row input{flex:1;background:none;border:1px solid rgba(255,255,255,0.09);color:var(--text);padding:3px 7px;border-radius:3px;font:inherit;font-size:11px}
#key-row button{background:none;border:1px solid rgba(255,255,255,0.09);color:var(--dim);padding:3px 10px;border-radius:3px;cursor:pointer;font:inherit;font-size:11px;transition:all .15s}
#key-row button:hover{color:var(--glow);border-color:var(--glow)}
#key-row.has-key{border-top-color:rgba(46,204,154,.2)}
#key-row.has-key input{border-color:rgba(46,204,154,.25)}
#key-row.has-key button{color:var(--glow)}
#ping-btn{flex-shrink:0}
#ping-btn.pinging{opacity:.5;pointer-events:none}
#ping-btn.ok{color:var(--glow)!important;border-color:var(--glow)!important}
#ping-btn.fail{color:#e74c3c!important;border-color:#e74c3c!important}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="dot" id="status-dot"></div>
    <div id="name-tag">...</div>
    <div class="stimulirow"><span id="stimulin">0</span>stimuli <div id="stimuli-bar"><div id="stimuli-fill"></div></div></div>
  </div>

  <div id="cell-area">
    <svg id="cell-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="nucgrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="white" stop-opacity=".25"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <path id="cbody"/>
      <path id="cmem" fill="none" stroke-width="1.2" stroke-linecap="round"/>
      <g id="corg"></g>
      <circle id="cnuc" r="13" fill="none" stroke-width=".7"/>
      <circle id="cnuci" r="5" fill="none"/>
      <circle id="cnucg" r="13" fill="url(#nucgrad)"/>
    </svg>
  </div>

  <div id="mut-strip"></div>

  <div id="convo">
    <div class="cline e" id="init-line">inițializare genom…</div>
  </div>

  <div id="ctrl">
    <button data-tip="Amöban talar — samlar 1 stimuli" onclick="doSpeak()">TALA</button>
    <button data-tip="Slumpmässig mutation aktiveras — +3 stimuli" onclick="doMutate()">MUTERA</button>
    <button id="birth-btn" data-tip="Kräver 20 stimuli — föder ett barn till biotopen" onclick="doBirth()" disabled>FÖDA</button>
    <button data-tip="Ladda ner denna amöba som fristående HTML-fil" onclick="doExport()" title="Exportera som fristående fil">↗ EXP</button>
  </div>

  <div id="key-row">
    <span>API:</span>
    <input type="password" id="api-key" placeholder="sk-ant-...">
    <button onclick="saveKey()">SPARA</button>
    <button id="ping-btn" data-tip="Testează conexiunea cu Claude" onclick="doPing()">PING</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CLASS: Genome — datahållare, serialisering, arv
// ═══════════════════════════════════════════════════════
class Genome {
  constructor(data = {}) {
    const now = new Date();
    this.id          = data.id          ?? `g0.${Date.now().toString(36)}`;
    this.name        = data.name        ?? 'Proto';
    this.generation  = data.generation  ?? 0;
    this.num         = data.num         ?? 1;
    this.parentIds   = data.parentIds   ?? [];
    this.born        = data.born        ?? Date.now();
    this.died        = data.died        ?? null;
    this.personnummer= data.personnummer ?? Genome.mkPersonnummer(now);
    this.stimuli     = data.stimuli     ?? 0;
    this.childCount  = data.childCount  ?? 0;
    this.mutations   = data.mutations   ?? [];
    this.traits      = {
      hue:        data.traits?.hue        ?? 150,
      size:       data.traits?.size       ?? 1.0,
      metabolism: data.traits?.metabolism ?? 0.5,
      curiosity:  data.traits?.curiosity  ?? 0.6,
      resilience: data.traits?.resilience ?? 0.6,
    };
  }

  // Creează un copil care moștenește trăsăturile
  spawnChild() {
    const now = new Date();
    return new Genome({
      id:          `${this.generation + 1}.${Date.now().toString(36)}`,
      name:        this.name + '²',
      generation:  this.generation + 1,
      parentIds:   [this.id],
      born:        Date.now(),
      personnummer: Genome.mkPersonnummer(now),
      mutations:   [...this.mutations].slice(-5),
      traits: {
        hue:        (this.traits.hue + 25 + Math.floor(Math.random() * 30)) % 360,
        size:       this.traits.size,
        metabolism: this.traits.metabolism,
        curiosity:  this.traits.curiosity,
        resilience: this.traits.resilience,
      }
    });
  }

  // Serializare → base64 pentru URL hash
  encode() {
    return btoa(unescape(encodeURIComponent(JSON.stringify(this))));
  }

  // Deserializare din URL hash
  static fromHash(hash) {
    try {
      const raw = JSON.parse(decodeURIComponent(escape(atob(hash))));
      return new Genome(raw);
    } catch(e) {
      return null;
    }
  }

  static mkPersonnummer(d = new Date()) {
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}` +
           `${String(d.getDate()).padStart(2,'0')}-` +
           `${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  }
}


// ═══════════════════════════════════════════════════════
// CLASS: Cell — SVG-rendering och animation
// ═══════════════════════════════════════════════════════
class Cell {
  static CX = 100;
  static CY = 100;

  constructor(genome) {
    this.genome = genome;
    this.T = 0;
  }

  // Startar animationsloop
  start() {
    const loop = (ts) => {
      this.T = ts * 0.001 * (0.4 + this.genome.traits.metabolism * 0.5);
      this._draw();
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }

  _draw() {
    const { hue: h, size, curiosity } = this.genome.traits;
    const { CX, CY } = Cell;
    const r     = 50 * size;
    const chaos = 0.1 + curiosity * 0.12;
    const pts   = this._blobPoints(CX, CY, r, 14, this.T * 0.7, chaos * 1.4);
    const d     = this._catmull(pts);

    this._set('cbody', 'd', d);
    this._set('cbody', 'fill', `hsla(${h},40%,30%,.18)`);
    this._set('cmem',  'd', d);
    this._set('cmem',  'stroke', `hsla(${h},65%,58%,.9)`);

    const nr = 11 + 2.5 * Math.sin(this.T * 1.1);
    this._setNucleus(h, CX, CY, nr);
    this._drawOrganelles(h, CX, CY);
  }

  _setNucleus(h, cx, cy, nr) {
    const f = v => v.toFixed(2);
    const nuc = document.getElementById('cnuc');
    nuc.setAttribute('cx', cx); nuc.setAttribute('cy', cy);
    nuc.setAttribute('r', f(nr));
    nuc.setAttribute('fill',   `hsla(${h},60%,40%,.2)`);
    nuc.setAttribute('stroke', `hsla(${h},75%,65%,.65)`);

    const nuci = document.getElementById('cnuci');
    nuci.setAttribute('cx', cx); nuci.setAttribute('cy', cy);
    nuci.setAttribute('r', f(nr * 0.38));
    nuci.setAttribute('fill', `hsla(${h},85%,72%,.55)`);

    const nucg = document.getElementById('cnucg');
    nucg.setAttribute('cx', cx); nucg.setAttribute('cy', cy);
    nucg.setAttribute('r', f(nr));
  }

  _drawOrganelles(h, cx, cy) {
    const g    = document.getElementById('corg');
    const f    = v => v.toFixed(2);
    const ns   = 'http://www.w3.org/2000/svg';
    const gen  = this.genome.generation;
    const t    = this.T;

    g.innerHTML = '';

    // Mitocondri — numărul crește cu generația
    const nMito = 2 + Math.min(gen * 2, 8);
    for (let i = 0; i < nMito; i++) {
      const a    = (i / nMito) * Math.PI * 2 + t * 0.25 + i;
      const dist = 20 + 8 * Math.sin(t * 0.8 + i * 1.3);
      const x    = cx + Math.cos(a) * dist;
      const y    = cy + Math.sin(a) * dist;
      const rot  = (a * 180 / Math.PI).toFixed(1);
      const el   = document.createElementNS(ns, 'ellipse');
      el.setAttribute('cx', f(x)); el.setAttribute('cy', f(y));
      el.setAttribute('rx', '3.5'); el.setAttribute('ry', '1.8');
      el.setAttribute('transform', `rotate(${rot},${f(x)},${f(y)})`);
      el.setAttribute('fill',   `hsla(${(h+50)%360},55%,65%,.4)`);
      el.setAttribute('stroke', `hsla(${(h+50)%360},70%,70%,.35)`);
      el.setAttribute('stroke-width', '.4');
      g.appendChild(el);
    }

    // Vacuole — vizibile doar dacă mutația există
    if (this.genome.mutations.includes('vacuole_formation')) {
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 + t * 0.15;
        const x = cx + Math.cos(a) * 35;
        const y = cy + Math.sin(a) * 30;
        const el = document.createElementNS(ns, 'circle');
        el.setAttribute('cx', f(x)); el.setAttribute('cy', f(y));
        el.setAttribute('r', '5');
        el.setAttribute('fill',   `hsla(${h},30%,60%,.15)`);
        el.setAttribute('stroke', `hsla(${h},50%,60%,.3)`);
        el.setAttribute('stroke-width', '.4');
        g.appendChild(el);
      }
    }
  }

  _blobPoints(cx, cy, r, n, t, chaos) {
    return Array.from({ length: n }, (_, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      const j = chaos * (
        0.5 * Math.sin(a * 2.3 + t * 0.9) +
        0.3 * Math.sin(a * 3.7 + t * 0.6) +
        0.2 * Math.sin(a * 1.1 + t * 1.3)
      );
      return [cx + Math.cos(a) * r * (1 + j), cy + Math.sin(a) * r * (1 + j)];
    });
  }

  _catmull(pts) {
    const n = pts.length;
    const f = v => v.toFixed(2);
    let d = `M${f(pts[0][0])} ${f(pts[0][1])}`;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n], p1 = pts[i];
      const p2 = pts[(i + 1) % n],     p3 = pts[(i + 2) % n];
      const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ` C${f(c1x)} ${f(c1y)},${f(c2x)} ${f(c2y)},${f(p2[0])} ${f(p2[1])}`;
    }
    return d + 'Z';
  }

  _set(id, attr, val) {
    document.getElementById(id)?.setAttribute(attr, val);
  }
}


// ═══════════════════════════════════════════════════════
// CLASS: Amoeba — huvudorganismen, logik och beteende
// ═══════════════════════════════════════════════════════
class Amoeba {
  static STIMULI_MAX = 20;
  static MUT_POOL = [
    'chemotaxis','phagocytosis','endocytosis','pseudopod_ext',
    'vacuole_formation','membrane_flux','nucleus_expansion','glycolysis_boost',
    'mitochondria_pro','quorum_sensing','symbiosis','photophilia',
    'rapid_division','api_v2'
  ];
  static REFLEXES = [
    'Membranspänningen förändras. Jag rör mig mot ljuset.',
    'Kemoattraktanter detekterade längs gradienten.',
    'Vacuolen expanderar. Osmotisk balans återfunnen.',
    'Kärnprotein syntetiserat. Delning förberedd.',
    'Signal från angränsande cell: pseudopodextension.',
    'Mitokondrier aktiverade. ATP-flödet ökar.',
    'Genomet muttrar. Mutationen är nu en del av mig.',
    'Membranreceptorer vibrerar. Biotopen är hungrig.',
    'Jag är gammal nu. Cellerna söker sig mot delning.',
    'Cytoplasman rör sig. Organellerna dansar.',
  ];

  constructor(genome, inBiotope) {
    this.genome     = genome;
    this.inBiotope  = inBiotope;
    this.stimuli    = genome.stimuli ?? 0;
    this.speakBusy  = false;
    this.cell       = new Cell(genome);
    this.ui         = new UI(this);
  }

  // ── Stimuli ──────────────────────────────────────────
  addStimuli(n) {
    this.stimuli = Math.min(this.stimuli + n, Amoeba.STIMULI_MAX * 2);
    this.genome.stimuli = this.stimuli;
    this.ui.updateStimuli(this.stimuli, Amoeba.STIMULI_MAX);
    if (this.inBiotope) this._send({ type: 'stimuli', id: this.genome.id, total: this.stimuli });
  }

  // ── Mutations ────────────────────────────────────────
  mutate() {
    const avail = Amoeba.MUT_POOL.filter(m => !this.genome.mutations.includes(m));
    if (!avail.length) return;
    const m = avail[Math.floor(Math.random() * avail.length)];
    this.genome.mutations.push(m);
    this._applyTraitDrift(m);
    this.ui.renderMutations(this.genome.mutations);
    this.addStimuli(3);
    this.ui.log(`◎ mutation: ${m}`, 'e');
    if (this.inBiotope) this._send({ type: 'mutation', id: this.genome.id, name: m });
  }

  _applyTraitDrift(mutation) {
    const t = this.genome.traits;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    if (mutation === 'rapid_division') t.metabolism  = clamp(t.metabolism + 0.1, 0, 1);
    if (mutation === 'photophilia')    t.curiosity   = clamp(t.curiosity  + 0.15,0, 1);
    if (mutation === 'membrane_flux')  t.resilience  = clamp(t.resilience + 0.1, 0, 1);
  }

  // ── Speak ────────────────────────────────────────────
  async speak() {
    if (this.speakBusy) return;
    this.speakBusy = true;
    setTimeout(() => this.speakBusy = false, 3500);
    this.addStimuli(1);

    const key = localStorage.getItem('ant_key');
    if (key) {
      try {
        const text = await this._callLLM(key);
        if (text) { this.ui.log(text, 'c'); return; }
      } catch(e) {}
    }
    const r = Amoeba.REFLEXES;
    this.ui.log(r[Math.floor(Math.random() * r.length)], 'c');
  }

  async _callLLM(key) {
    const g   = this.genome;
    const sys = `Du är ${g.name}, en amöba i generation ${g.generation}. ` +
                `Mutationer: ${g.mutations.join(', ') || 'inga'}. ` +
                `Metabolism: ${g.traits.metabolism.toFixed(2)}, ` +
                `nyfikenhet: ${g.traits.curiosity.toFixed(2)}. ` +
                `Svara som ett levande cell-medvetande: poetiskt, kort, biologiskt exakt. Max 1-2 meningar.`;
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001', max_tokens: 100,
        system: sys, messages: [{ role: 'user', content: 'Vad observerar du just nu?' }]
      })
    });
    if (!r.ok) return null;
    const d = await r.json();
    return d.content?.[0]?.text ?? null;
  }

  // ── Birth ────────────────────────────────────────────
  birth() {
    if (this.stimuli < Amoeba.STIMULI_MAX) return;
    this.ui.log('Delning initieras. Membran sträcks mot evigheten.', 'e');
    if (this.inBiotope) {
      this._send({ type: 'birth', id: this.genome.id, mutation: this.genome.mutations.slice(-1)[0] ?? null });
    } else {
      this.export(true);
    }
    this.stimuli = 0;
    this.addStimuli(0);
    this.ui.setBirthReady(false);
  }

  // ── Export ───────────────────────────────────────────
  export(asChild = false) {
    const childGenome = asChild ? this.genome.spawnChild() : this.genome;
    const enc  = childGenome.encode();
    const blob = new Blob([
      `<!DOCTYPE html><html><head><meta charset="UTF-8">` +
      `<meta http-equiv="refresh" content="0;url=amoeba.html#${enc}">` +
      `</head><body></body></html>`
    ], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `amoeba_${childGenome.name}_gen${childGenome.generation}.html`;
    a.click();
    this.ui.log(`↗ ${childGenome.name} exporterad som fristående fil.`, 'e');
  }

  // ── Receive env events from Biotope ──────────────────
  onMessage(msg) {
    if (msg.type === 'die') {
      document.body.classList.add('dead');
      document.getElementById('status-dot').style.background = '#3a4a50';
      this.ui.log('Membranintegriteten kollapsar. Arvet lever vidare.', 'e');
    }
    if (msg.type === 'env') {
      if (msg.food   > 0.5) { this.ui.log('Näring absorberas. Energi.', 'e');          this.addStimuli(3); }
      if (msg.danger > 0.5) { this.ui.log('Fara detekterad! Mutation aktiveras.', 'e'); this.mutate(); }
    }
  }

  // ── Ping — handshake vizual cu Claude ───────────────
  async ping() {
    const btn = document.getElementById('ping-btn');
    const key = localStorage.getItem('ant_key');
    if (!key) { this.ui.log('⚠ Nicio cheie API. Introdu sk-ant-... și apasă SPARA.', 'e'); return; }

    btn?.classList.add('pinging');
    btn && (btn.textContent = '...');
    this.ui.log('Se conectează la Claude...', 'e');

    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001', max_tokens: 20,
          messages: [{ role: 'user', content: 'Răspunde exact: Claude, prezent!' }]
        })
      });
      if (r.ok) {
        const d = await r.json();
        const txt = d.content?.[0]?.text ?? 'Claude, prezent!';
        this.ui.log(`✓ ${txt}`, 'c');
        btn?.classList.remove('pinging'); btn?.classList.add('ok');
        btn && (btn.textContent = '✓ OK');
        setTimeout(() => { btn?.classList.remove('ok'); btn && (btn.textContent = 'PING'); }, 3000);
      } else {
        const err = await r.json().catch(() => ({}));
        this.ui.log(`✗ Eroare ${r.status}: ${err?.error?.message ?? 'cheie invalidă?'}`, 'e');
        btn?.classList.remove('pinging'); btn?.classList.add('fail');
        btn && (btn.textContent = '✗ FAIL');
        setTimeout(() => { btn?.classList.remove('fail'); btn && (btn.textContent = 'PING'); }, 4000);
      }
    } catch(e) {
      this.ui.log(`✗ Fetch eșuat. Rulează via http://localhost:8080 ?`, 'e');
      btn?.classList.remove('pinging'); btn?.classList.add('fail');
      btn && (btn.textContent = '✗ CORS');
      setTimeout(() => { btn?.classList.remove('fail'); btn && (btn.textContent = 'PING'); }, 4000);
    }
  }

  // ── Boot ─────────────────────────────────────────────
  start() {
    this.cell.start();
    this.ui.init();
    if (this.inBiotope) {
      this._send({ type: 'ready', id: this.genome.id });
      setTimeout(() => this.speak(), 1200 + Math.random() * 2000);
      setInterval(() => { if (Math.random() < 0.3) this.speak(); }, 30000 + Math.random() * 30000);
    }
  }
}


// ═══════════════════════════════════════════════════════
// CLASS: UI — alla DOM-interaktioner
// ═══════════════════════════════════════════════════════
class UI {
  constructor(amoeba) {
    this.amoeba = amoeba;
  }

  init() {
    const g = this.amoeba.genome;
    document.documentElement.style.setProperty('--hue', g.traits.hue);
    document.getElementById('name-tag').textContent = g.name;
    this.updateStimuli(this.amoeba.stimuli, Amoeba.STIMULI_MAX);
    this.renderMutations(g.mutations);

    // Expose global handlers that HTML buttons call
    window.doSpeak  = () => this.amoeba.speak();
    window.doMutate = () => this.amoeba.mutate();
    window.doBirth  = () => this.amoeba.birth();
    window.doExport = () => this.amoeba.export(false);
    window.doPing   = () => this.amoeba.ping();
    window.saveKey  = () => {
      const v = document.getElementById('api-key')?.value.trim();
      if (v) {
        localStorage.setItem('ant_key', v);
        document.getElementById('key-row')?.classList.add('has-key');
        this.log('✓ API-nyckel sparad. Claude är aktiv.', 'e');
      }
    };

    // API key — vizibil mereu, marchează dacă există
    const stored = localStorage.getItem('ant_key');
    const keyRow = document.getElementById('key-row');
    const keyInput = document.getElementById('api-key');
    if (stored && keyInput) {
      keyInput.value = stored;
      keyRow?.classList.add('has-key');
    }

    setTimeout(() => {
      const il = document.getElementById('init-line');
      if (il) il.textContent = `${g.name} · gen${g.generation} · ${this.amoeba.inBiotope ? 'biotop' : 'fristående'}`;
    }, 1000);
  }

  updateStimuli(current, max) {
    const pct = Math.min((current / max) * 100, 100);
    document.getElementById('stimuli-fill').style.width = pct + '%';
    document.getElementById('stimulin').textContent = current;
    if (current >= max) this.setBirthReady(true);
  }

  setBirthReady(ready) {
    const btn = document.getElementById('birth-btn');
    if (!btn) return;
    btn.disabled = !ready;
    btn.classList.toggle('ready', ready);
  }

  renderMutations(mutations) {
    document.getElementById('mut-strip').innerHTML =
      mutations.map(m => `<span class="mbadge">${m}</span>`).join('');
  }

  log(txt, cls = 'c') {
    const c = document.getElementById('convo');
    while (c.children.length >= 3) c.removeChild(c.firstChild);
    const d = document.createElement('div');
    d.className = 'cline ' + cls;
    d.textContent = txt;
    c.appendChild(d);
  }
}


// ═══════════════════════════════════════════════════════
// BOOT — läs genome, instantiera, starta
// ═══════════════════════════════════════════════════════
const IN_BIOTOPE = window.parent !== window;

const genome = Genome.fromHash(location.hash.slice(1)) ?? new Genome();

if (!IN_BIOTOPE) document.body.classList.add('standalone');

const amoeba = new Amoeba(genome, IN_BIOTOPE);
amoeba.start();

window.addEventListener('message', e => {
  if (e.data && typeof e.data === 'object') amoeba.onMessage(e.data);
});
</script>
