<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOTOPE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='38%25' cy='35%25'%3E%3Cstop offset='0%25' stop-color='%232ecc9a' stop-opacity='.9'/%3E%3Cstop offset='100%25' stop-color='%230a4a35' stop-opacity='.8'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cellipse cx='14' cy='17' rx='11' ry='9' fill='url(%23g)' transform='rotate(-15 14 17)'/%3E%3Cellipse cx='21' cy='13' rx='6' ry='8' fill='url(%23g)' opacity='.7' transform='rotate(20 21 13)'/%3E%3Ccircle cx='15' cy='16' r='3.5' fill='%230d1215' opacity='.6'/%3E%3Ccircle cx='15' cy='16' r='1.5' fill='%232ecc9a' opacity='.9'/%3E%3Ccircle cx='22' cy='8' r='1.2' fill='%232ecc9a' opacity='.6'/%3E%3Ccircle cx='9' cy='11' r='0.9' fill='%232ecc9a' opacity='.5'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040709;--bg2:#070c10;
  --border:rgba(255,255,255,0.08);
  --text:#c8dde4;--dim:#5a7a88;
  --glow:#2ecc9a;--glowfade:rgba(46,204,154,.1);
  --font:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:15px;line-height:1.5}
#app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:1fr 44px;height:100vh}

/* ── SIDEBAR ────────────────────────────────────────── */
#sidebar{grid-row:1/2;border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column}
#sb-head{padding:14px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-head h1{font-size:14px;letter-spacing:.18em;color:var(--glow);text-transform:uppercase;font-weight:normal}
#sb-sub{font-size:13px;color:var(--dim);margin-top:3px}
#family-list{flex:1;padding:6px 4px;overflow-y:auto;display:flex;flex-direction:column}

/* tree nodes */
.tree-row{display:flex;align-items:flex-start;gap:2px;margin-bottom:2px}
.tree-tog{flex-shrink:0;width:16px;text-align:center;font-size:13px;
  color:var(--dim);cursor:pointer;padding-top:7px;user-select:none;transition:color .1s}
.tree-tog:hover{color:var(--glow)}
.ccard{flex:1;min-width:0;padding:7px 9px 7px 8px;border-radius:5px;
  border:1px solid var(--border);border-left:3px solid transparent;
  cursor:pointer;transition:background .15s,border-color .2s;position:relative}
.ccard:hover{background:rgba(255,255,255,.04)}
.ccard.alive{border-left-color:hsl(var(--chue,150),55%,48%)}
.ccard.fossil{opacity:.32;pointer-events:none}
.ccard.selected{background:rgba(255,255,255,.06);
  border-color:hsl(var(--chue,150),50%,38%);
  box-shadow:0 0 0 1px hsla(var(--chue,150),55%,48%,.35)}
.cname{font-size:15px;font-weight:bold;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:13px;color:var(--dim);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cstatus{font-size:12px;position:absolute;top:6px;right:7px}
.cstatus.alive{color:var(--glow)}
.cstatus.dead{color:var(--dim)}

/* ── LAC ──────────────────────────────────────────── */
#lake{grid-row:1/2;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 22% 28%, rgba(46,160,120,.05) 0%, transparent 50%),
    radial-gradient(ellipse at 78% 72%, rgba(46,90,200,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #060e14 0%, #040709 100%)}
#lake::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(2,4,6,.55) 100%);
  pointer-events:none;z-index:10}

/* ── UNITATE ABEOMA ───────────────────────────────── */
.aunit{position:absolute;left:0;top:0;display:flex;align-items:flex-start;gap:10px;
  animation:appar .5s ease;will-change:transform;z-index:5}
@keyframes appar{from{opacity:0;transform:scale(.82)}to{opacity:1}}
.aunit.fossil{opacity:.18;pointer-events:none}
.aunit.fossil .ablob{filter:grayscale(1)brightness(.35)}
.aunit.selected .ablob{
  filter:drop-shadow(0 0 14px hsla(var(--chue,150),90%,70%,.85))
         drop-shadow(0 0 4px rgba(255,255,255,.5))}

/* blob SVG — 3.5 cm */
.ablob{width:4.5cm;height:4.5cm;flex-shrink:0;overflow:visible;cursor:pointer;
  filter:drop-shadow(0 0 6px hsla(var(--chue,150),60%,50%,.25))}
.ablob:not(.aunit.selected .ablob):hover{
  filter:drop-shadow(0 0 10px hsla(var(--chue,150),65%,55%,.55))}

.afossil-label{width:4.5cm;text-align:center;font-size:14px;
  color:var(--dim);margin-top:4px;letter-spacing:.04em}

/* ── PANOU LOG (6 cm lăţime) ─────────────────────── */
.alog{width:12cm;background:rgba(4,9,14,.92);border:1px solid rgba(255,255,255,.09);
  border-radius:7px;display:none;flex-direction:column;overflow:hidden;
  backdrop-filter:blur(5px);flex-shrink:0;margin-top:2px;
  max-height:calc(4.5cm + 260px)}
.aunit.selected .alog{display:flex}

/* mini header tehnic */
.alog-tech{display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-bottom:1px solid var(--border);background:rgba(0,0,0,.18);
  font-size:15px;color:var(--dim)}
.atb-gen{color:hsl(var(--chue,150),50%,55%);font-weight:bold}
.atb-mut{color:var(--dim)}
.atb-ai{display:flex;align-items:center;gap:4px;margin-left:auto}
.atb-ai-dot{width:8px;height:8px;border-radius:50%;background:#3a5060;transition:background .4s}
.atb-ai-dot.api{background:#2ecc71}
.atb-ai-dot.ollama{background:#f1c40f}
.atb-ai-dot.reflex{background:#3a5060}
.atb-ai-lbl{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}

/* input comentariu — în capul listei */
.alog-comment{display:flex;gap:5px;padding:8px 9px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02)}
.alog-cinput{flex:1;min-width:0;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:#e8f2f5;
  font-family:var(--font);font-size:13px;padding:5px 8px;border-radius:3px;outline:none}
.alog-cinput::placeholder{color:var(--dim)}
.alog-cinput:focus{border-color:rgba(46,204,154,.45);background:rgba(46,204,154,.05)}
.alog-csend{background:none;border:1px solid rgba(255,255,255,.12);color:#8aa8b4;
  cursor:pointer;padding:5px 10px;border-radius:3px;font-family:var(--font);
  font-size:15px;transition:all .15s;line-height:1}
.alog-csend:hover{color:var(--glow);border-color:var(--glow)}

/* nume — 2 rânduri */
.alog-name{padding:6px 10px 5px;border-bottom:1px solid var(--border)}
.alog-name-main{font-size:17px;font-weight:bold;
  color:hsl(var(--chue,150),65%,62%);line-height:1.3}
.alog-name-pn{font-size:15px;color:#a8c8d4;margin-top:2px}

/* stimuli */
.alog-stim{display:flex;align-items:center;gap:6px;padding:5px 10px;
  font-size:15px;color:#b0ccd6;border-bottom:1px solid var(--border)}
.alog-stimn{color:hsl(var(--chue,150),65%,62%);font-weight:bold}
.alog-sbar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.alog-sfill{height:100%;background:hsl(var(--chue,150),55%,48%);border-radius:2px;transition:width .4s}

/* intrări log */
.alog-entries{flex:1;overflow-y:auto;padding:6px 10px;
  display:flex;flex-direction:column;gap:3px;min-height:60px}
.alog-entry{font-size:13px;line-height:1.5;word-break:break-word;color:#ddeaf0}
.alog-entry.speech{color:hsl(var(--chue,150),70%,75%);font-style:italic}
.alog-entry.event{color:#c8dde5}
.alog-entry.comment{color:#ffffff;font-weight:bold}

/* butoane acţiuni */
.alog-acts{display:flex;gap:4px;padding:6px 9px;border-top:1px solid var(--border)}
.alog-abtn{flex:1;background:none;border:1px solid rgba(255,255,255,.12);
  color:#b0ccd6;padding:6px 2px;border-radius:3px;cursor:pointer;
  font-family:var(--font);font-size:15px;text-transform:uppercase;
  letter-spacing:.07em;transition:all .15s}
.alog-abtn:hover{color:var(--glow);border-color:var(--glow);background:var(--glowfade)}
.alog-abtn:disabled{opacity:.2;pointer-events:none}
.alog-abtn.ready{color:var(--glow);border-color:var(--glow)}

/* ── FOOTER ───────────────────────────────────────── */
#footer{grid-column:1/3;border-top:1px solid var(--border);background:var(--bg2);
  display:flex;align-items:center;gap:12px;padding:0 14px;
  font-size:14px;color:var(--dim);transition:border-top-color .5s}
.stat{display:flex;align-items:center;gap:5px}
.val{color:var(--glow);font-weight:bold;font-size:15px}
.stat-sep{color:var(--border)}

/* indicator nutrienți */
#nutri-wrap{display:flex;align-items:center;gap:5px;cursor:default}
#nutri-led{width:11px;height:11px;border-radius:50%;
  background:#e74c3c;transition:background .6s;flex-shrink:0}
#nutri-led.orange{background:#f39c12}
#nutri-led.green{background:#2ecc71}
#nutri-pct{font-size:13px;color:var(--dim)}

#footer button{background:none;border:1px solid var(--border);color:var(--dim);
  padding:5px 11px;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;
  text-transform:uppercase;letter-spacing:.1em;transition:all .15s}
#footer button:hover{color:var(--glow);border-color:var(--glow);background:var(--glowfade)}
#spawn-btn{margin-left:auto;color:var(--glow);border-color:rgba(46,204,154,.4)}
#reset-btn{color:#c0392b;border-color:rgba(192,57,43,.3)}
#reset-btn:hover{color:#e74c3c;border-color:#e74c3c;background:rgba(231,76,60,.08)!important}
#key-wrap{display:flex;align-items:center;gap:5px;font-size:13px}
#key-wrap input{width:125px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:var(--text);
  font:inherit;font-size:13px;padding:3px 7px;border-radius:3px;outline:none}
#key-wrap input:focus{border-color:rgba(46,204,154,.35)}
#key-wrap button{background:none;border:1px solid rgba(255,255,255,.1);
  color:var(--dim);cursor:pointer;padding:3px 8px;border-radius:3px;
  font:inherit;font-size:13px;transition:all .15s}
#key-wrap button:hover{color:var(--glow);border-color:var(--glow)}

@keyframes flash-food{0%,100%{border-top-color:var(--border)}50%{border-top-color:var(--glow)}}
@keyframes flash-danger{0%,100%{border-top-color:var(--border)}50%{border-top-color:#e74c3c}}
#footer.flash-food{animation:flash-food .8s ease}
#footer.flash-danger{animation:flash-danger .8s ease}

/* canvas animații */
#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;width:100%;height:100%}
/* trail canvas — sub lake, deasupra background */
#trail-canvas{position:absolute;inset:0;pointer-events:none;z-index:2;width:100%;height:100%}

/* quorum glow — amobe aproape */
.aunit.quorum .ablob{
  filter:drop-shadow(0 0 18px hsla(var(--chue,150),100%,75%,.7))
         drop-shadow(0 0 6px rgba(255,255,255,.4))}

/* jurnal */
.alog-journal{border-top:1px solid var(--border);padding:6px 10px;max-height:120px;overflow-y:auto}
.alog-journal-title{font-size:13px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.alog-journal-entry{font-size:14px;color:#c8e8d8;line-height:1.5;margin-bottom:4px;font-style:italic;
  border-left:2px solid hsla(var(--chue,150),55%,48%,.4);padding-left:6px}

/* predator flash */
@keyframes devour{0%{opacity:1}30%{opacity:0;transform:scale(1.4)}100%{opacity:0;transform:scale(0)}}
.aunit.being-devoured{animation:devour .8s ease forwards!important}

/* autosave indicator */
#autosave-btn{font-size:12px;color:var(--dim);border-color:rgba(255,255,255,.08)}
#autosave-btn.saved{color:#2ecc71;border-color:rgba(46,204,154,.3)}
#autosave-btn.error{color:#e74c3c}

/* ── REPROGRAMARE ─────────────────────────────────────── */
#reprog-panel{padding:10px 10px 6px;border-bottom:1px solid var(--border);flex-shrink:0}
#reprog-title{font-size:11px;letter-spacing:.16em;color:var(--glow);
  text-transform:uppercase;margin-bottom:7px;font-weight:normal}
#reprog-input{width:100%;height:80px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:#e0eff5;
  font-family:var(--font);font-size:12px;padding:7px 8px;border-radius:4px;
  resize:none;outline:none;line-height:1.5;transition:border-color .2s}
#reprog-input:focus{border-color:rgba(46,204,154,.4);background:rgba(46,204,154,.03)}
#reprog-input::placeholder{color:var(--dim);font-style:italic}
#reprog-controls{display:flex;gap:5px;margin-top:6px}
#reprog-model{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:var(--dim);font-family:var(--font);font-size:11px;padding:4px 6px;
  border-radius:3px;outline:none;cursor:pointer}
#reprog-model option{background:#0a0d10}
#reprog-btn{background:none;border:1px solid rgba(46,204,154,.4);
  color:var(--glow);font-family:var(--font);font-size:11px;
  padding:4px 10px;border-radius:3px;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;transition:all .2s;white-space:nowrap}
#reprog-btn:hover{background:var(--glowfade);border-color:var(--glow)}
#reprog-btn:disabled{opacity:.35;pointer-events:none}
#reprog-status{font-size:11px;margin-top:6px;min-height:18px;color:var(--dim);
  display:flex;align-items:center;gap:5px}
#reprog-status.ok{color:#2ecc71}
#reprog-status.err{color:#e74c3c}
#reprog-status.working{color:#f1c40f}
#reprog-preview{margin-top:5px;font-size:10px;color:var(--dim);
  max-height:55px;overflow:hidden;border-left:2px solid rgba(255,255,255,.08);
  padding-left:6px;line-height:1.4;display:none;font-style:italic}
#reprog-bar{height:2px;background:rgba(46,204,154,.15);margin-top:6px;border-radius:1px;overflow:hidden;display:none}
#reprog-bar-fill{height:100%;background:var(--glow);width:0%;transition:width .4s}

/* ping */
#ping-btn{color:var(--dim)}
#ping-btn.pinging{opacity:.5;pointer-events:none}
#ping-btn.ok{color:#2ecc71!important;border-color:#2ecc71!important}
#ping-btn.fail{color:#e74c3c!important;border-color:#e74c3c!important}

/* ping toast */
#ping-toast{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
  background:#0d1215;border:1px solid rgba(255,255,255,.15);
  color:#9ab0b8;font-size:14px;padding:6px 14px;border-radius:5px;
  font-family:'Courier New',monospace;pointer-events:none;
  opacity:0;transition:opacity .3s;z-index:1000;white-space:nowrap}
#ping-toast.show{opacity:1}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<canvas id="fx-canvas"></canvas>
<canvas id="trail-canvas"></canvas>
<div id="ping-toast"></div>
<div id="app">
  <aside id="sidebar">
    <div id="sb-head">
      <h1>◉ BIOTOP</h1>
      <div id="sb-sub">lac abeomas</div>
      <button id="autosave-btn" onclick="autosaveFile()" style="margin-top:8px;width:100%;padding:4px 0;border-radius:3px;cursor:pointer;font-family:var(--font);font-size:12px;text-transform:uppercase;letter-spacing:.1em;background:none;border:1px solid rgba(255,255,255,.08);color:var(--dim);transition:all .3s" title="Salvează colonia în fișierul biotope.html">💾 AUTOSAVE ÎN FIȘIER</button>
    </div>

    <!-- ── REPROGRAMARE ── -->
    <div id="reprog-panel">
      <div id="reprog-title">⚙ REPROGRAMARE</div>
      <textarea id="reprog-input" placeholder="ex: Schimbă culoarea lacului în violet&#10;ex: Fă amobele să pulseze mai lent&#10;ex: Adaugă ploaie în fundal"></textarea>
      <div id="reprog-controls">
        <select id="reprog-model">
          <option value="claude-sonnet-4-6">Sonnet 4.6 ✦</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
        <button id="reprog-btn" onclick="reprogramBiotope()">▶ EXECUTĂ</button>
      </div>
      <div id="reprog-bar"><div id="reprog-bar-fill"></div></div>
      <div id="reprog-status"></div>
      <div id="reprog-preview"></div>
    </div>

    <div id="family-list"></div>
  </aside>
  <main id="lake"><canvas id="trail-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:2;width:100%;height:100%"></canvas></main>
  <footer id="footer">
    <div class="stat" title="Generația maximă">GEN <span class="val" id="s-gen">0</span></div>
    <span class="stat-sep">·</span>
    <div class="stat" title="Abeomas vii">VII <span class="val" id="s-alive">0</span></div>
    <div class="stat" title="Fosile">FOSILE <span class="val" id="s-dead">0</span></div>
    <div class="stat" title="Stimuli totali">STIMULI <span class="val" id="s-stimuli">0</span></div>
    <div id="nutri-wrap" title="Nivel nutrienți în lac">
      <div id="nutri-led"></div>
      <span id="nutri-pct">50%</span>
      <span style="color:var(--border)">NUTRI</span>
    </div>
    <button title="Nutrienți la toate abeomas (+3 stimuli)" onclick="envFood()">+ NUTRIENȚI</button>
    <button title="Pericol: mutație forțată" onclick="envDanger()">⚡ PERICOL</button>
    <button title="Amobele te salută vocal" onclick="greetMaster()" style="color:#f1c40f;border-color:rgba(241,196,15,.4)">🎙 SALUT</button>
    <div id="key-wrap">
      <span>API:</span>
      <input type="password" id="api-key" placeholder="sk-ant-…">
      <button onclick="saveKey()">✓</button>
      <button id="ping-btn" onclick="pingClaude()" title="Testează conexiunea Claude">PING</button>
    </div>
    <button id="spawn-btn" title="Naște o abeomă nouă gen 0" onclick="spawnGen0()">+ ABEOMĂ</button>
    <button id="reset-btn" title="Șterge colonia" onclick="resetBiotope()">✕ RESET</button>
  </footer>
</div>
<script>
'use strict';

// ── Dimensiuni CSS → pixeli ───────────────────────────────
let AMSIZE = 170, LOG_W = 454;
function calcSizes(){
  const d=document.createElement('div');
  d.style.cssText='position:absolute;visibility:hidden;';
  document.body.appendChild(d);
  d.style.width='4.5cm'; AMSIZE=d.offsetWidth||170;
  d.style.width='12cm';  LOG_W =d.offsetWidth||454;
  document.body.removeChild(d);
}

const LAKE=document.getElementById('lake');
let lakeW=0, lakeH=0;
function updateLakeSize(){lakeW=LAKE.offsetWidth;lakeH=LAKE.offsetHeight;}

// ── State ─────────────────────────────────────────────────
const B={creatures:new Map(),nextNum:1,maxGen:0,selected:null};
let nutrients=50; // 0-100
const expanded=new Set(); // ids with expanded children in sidebar

// ── Nomenclatură ──────────────────────────────────────────
const PRE=['Vesi','Mito','Proto','Cyto','Nucleo','Plasma','Ribo','Endo','Karyo','Lyso','Meso','Ecto','Glyco','Chromo'];
const SUF=['cyte','plast','some','mere','zoa','phage','morph','blast','soma','glia','pore','cyst'];
function mkName(gen,hue){const s=gen*41+Math.round(hue);return PRE[s%PRE.length]+SUF[Math.floor(s/5)%SUF.length]}
function mkPN(){const n=new Date();return`${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}-${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}`}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function mkGenome(generation=0,parentIds=[],pt=null){
  const num=B.nextNum++;
  const hue=pt?(pt.hue+(Math.random()*50-25)+360)%360:Math.random()*360;
  const g={id:`${generation}.${num}`,num,generation,parentIds,
    born:Date.now(),died:null,personnummer:mkPN(),stimuli:0,childCount:0,
    traits:{hue:Math.round(hue),
      size:      pt?clamp(pt.size      +(Math.random()-.5)*.3,.5,1.8):.85+Math.random()*.6,
      metabolism:pt?clamp(pt.metabolism+(Math.random()-.5)*.2,.15,.95):.3 +Math.random()*.6,
      curiosity: pt?clamp(pt.curiosity +(Math.random()-.5)*.25,0,1)     :Math.random(),
      resilience:pt?clamp(pt.resilience+(Math.random()-.5)*.2,.1,1)     :Math.random()},
    mutations:pt?.mutations?[...pt.mutations].slice(-6):[],name:''};
  g.name=mkName(generation,hue);
  return g;
}

// ── SVG blob ──────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
function svgE(t){return document.createElementNS(NS,t)}
function f(v){return v.toFixed(2)}

function catmull(pts){
  const n=pts.length;let d=`M${f(pts[0][0])} ${f(pts[0][1])}`;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${f(c1x)} ${f(c1y)},${f(c2x)} ${f(c2y)},${f(p2[0])} ${f(p2[1])}`;}
  return d+'Z';
}
function blobPts(cx,cy,r,n,t,chaos){
  return Array.from({length:n},(_,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const j=chaos*(.5*Math.sin(a*2.3+t*.9)+.3*Math.sin(a*3.7+t*.6)+.2*Math.sin(a*1.1+t*1.3));
    return[cx+Math.cos(a)*r*(1+j),cy+Math.sin(a)*r*(1+j)];
  });
}

function updateBlob(c,T){
  const{body,mem,nuc,nuci,nucg,org}=c.s;
  const CX=50,CY=50,r=20*c.genome.traits.size;
  const chaos=.1+c.genome.traits.curiosity*.12,h=c.genome.traits.hue;
  const d=catmull(blobPts(CX,CY,r,12,T*.7,chaos*1.4));
  body.setAttribute('d',d);body.setAttribute('fill',`hsla(${h},40%,30%,.18)`);
  mem.setAttribute('d',d);mem.setAttribute('stroke',`hsla(${h},65%,58%,.9)`);
  const nr=f(7+2*Math.sin(T*1.1+c.phase));
  nuc.setAttribute('cx',CX);nuc.setAttribute('cy',CY);nuc.setAttribute('r',nr);
  nuc.setAttribute('fill',`hsla(${h},60%,40%,.2)`);nuc.setAttribute('stroke',`hsla(${h},75%,65%,.65)`);
  nuci.setAttribute('cx',CX);nuci.setAttribute('cy',CY);nuci.setAttribute('r',f(+nr*.38));
  nuci.setAttribute('fill',`hsla(${h},85%,72%,.55)`);
  nucg.setAttribute('cx',CX);nucg.setAttribute('cy',CY);nucg.setAttribute('r',nr);
  const nd=Math.min(c.genome.mutations.length+2,8);
  while(org.children.length<nd)org.appendChild(svgE('circle'));
  while(org.children.length>nd)org.removeChild(org.lastChild);
  [...org.children].forEach((el,i)=>{
    const ai=(i/nd)*Math.PI*2+T*.3+i*.7+c.phase;
    const ri=r*.4+Math.sin(T*(.5+i*.2)+c.phase)*r*.15;
    el.setAttribute('cx',f(CX+Math.cos(ai)*ri));el.setAttribute('cy',f(CY+Math.sin(ai)*ri));
    el.setAttribute('r',f(1.2+.7*(i%3)));el.setAttribute('fill',`hsla(${h},60%,65%,.${20+i*6})`);
  });
}

function spawn(genome,savedPos){
  B.maxGen=Math.max(B.maxGen,genome.generation);
  const c=createUnit(genome);
  const margin=20,unitTotalW=AMSIZE+LOG_W+10;
  const maxX=Math.max(lakeW-unitTotalW-margin*2,AMSIZE);
  const maxY=Math.max(lakeH-AMSIZE-margin*2,AMSIZE);
  if(savedPos){c.x=savedPos.x||lakeW/2;c.y=savedPos.y||lakeH/2;
    c.vx=savedPos.vx||c.vx;c.vy=savedPos.vy||c.vy;c.phase=savedPos.phase||c.phase;}
  else{c.x=AMSIZE/2+margin+Math.random()*maxX;c.y=AMSIZE/2+margin+Math.random()*maxY;}
  c.el.style.transform=`translate(${Math.round(c.x-AMSIZE/2)}px,${Math.round(c.y-AMSIZE/2)}px)`;
  B.creatures.set(genome.id,c);
  updateStimUI(genome.id);
  addEntry(genome.id,`${genome.name} s-a născut · ${genome.personnummer}`,'event');
  save();render();stats();
  return c;
}

const MUT_POOL=['chemotaxie','fagocitoză','endocitoză','extensie_pseudopod',
  'formare_vacuolă','flux_membranar','expansie_nucleu','glicoliză_amplificată',
  'proliferare_mitocondrială','senzor_quorum','simbioză','fotofilie','divizare_rapidă','api_v2'];

function creatureMutate(id){
  const c=B.creatures.get(id);if(!c||c.status!=='alive')return;
  const avail=MUT_POOL.filter(m=>!c.genome.mutations.includes(m));if(!avail.length)return;
  const m=avail[Math.floor(Math.random()*avail.length)];
  c.genome.mutations.push(m);
  if(m==='divizare_rapidă')c.genome.traits.metabolism=Math.min(c.genome.traits.metabolism+.1,1);
  if(m==='fotofilie')c.genome.traits.curiosity=Math.min(c.genome.traits.curiosity+.15,1);
  if(m==='flux_membranar')c.genome.traits.resilience=Math.min(c.genome.traits.resilience+.1,1);
  addStimuli(id,3);addEntry(id,`◎ mutație: ${m}`,'event');
  if(c.tbMut)c.tbMut.textContent=`◎ ${c.genome.mutations.length}`;
  save();
}

function creatureBirth(id){
  const c=B.creatures.get(id);if(!c||c.stimuli<20||c.status!=='alive')return;
  c.stimuli=0;c.childCount++;c.genome.childCount=c.childCount;updateStimUI(id);
  const child=mkGenome(c.genome.generation+1,[c.genome.id],c.genome.traits);
  const lm=c.genome.mutations.slice(-1)[0];if(lm&&!child.mutations.includes(lm))child.mutations.push(lm);
  addEntry(id,`⊕ a dat naștere lui ${child.name} (gen${child.generation})`,'event');
  expanded.add(id); // auto-expand părintele în arbore
  spawn(child);
  if(c.childCount>=4)setTimeout(()=>fossilize(id),900);
  save();render();stats();
}

function fossilize(id){
  const c=B.creatures.get(id);if(!c||c.status!=='alive')return;
  c.status='fossil';c.genome.died=Date.now();
  c.el.classList.add('fossil');

  lbl.textContent=`☠ ${c.genome.name} · gen${c.genome.generation}`;
  c.el.appendChild(lbl);

  save();render();stats();
}

let voices = [];
function loadVoices(){
  voices = speechSynthesis.getVoices();

  if(!voices.length) setTimeout(loadVoices, 200);

loadVoices();

function speak(text, genome){
  if(!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  // Alege voce bazată pe hue — varietate de voci
  const ro = voices.filter(v => v.lang.startsWith('ro'));
  const any = voices.filter(v => v.lang.startsWith('en')||v.lang.startsWith('fr')||v.lang.startsWith('de'));
  const pool = ro.length ? ro : any.length ? any : voices;
  if(pool.length) utt.voice = pool[Math.floor(genome.traits.hue / 360 * pool.length) % pool.length];
  // Personalitate sonoră din genom
  utt.pitch  = 0.6 + genome.traits.curiosity * 1.4;   // curios = mai înalt
  utt.rate   = 0.7 + genome.traits.metabolism * 0.8;  // metabolism = mai rapid
  utt.volume = 0.85;
  utt.lang   = ro.length ? 'ro-RO' : 'en-US';
  speechSynthesis.speak(utt);
  return utt;
}

function getAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

// Explozie surdă la moarte
function soundDeath(){
  try{
    const ctx=getAudio();
    if(ctx.state==='suspended')ctx.resume();
    const t=ctx.currentTime;
    const buf=ctx.createBuffer(1,ctx.sampleRate*.4,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const lp=ctx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.setValueAtTime(160,t); lp.Q.value=1.5;
    const gain=ctx.createGain();
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(.9,t+.015);
    gain.gain.exponentialRampToValueAtTime(.001,t+.4);
    const osc=ctx.createOscillator();
    osc.type='sine'; osc.frequency.setValueAtTime(55,t);
    osc.frequency.exponentialRampToValueAtTime(18,t+.35);
    const gainO=ctx.createGain();
    gainO.gain.setValueAtTime(.6,t); gainO.gain.exponentialRampToValueAtTime(.001,t+.35);
    src.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
    osc.connect(gainO); gainO.connect(ctx.destination);
    src.start(t); src.stop(t+.4); osc.start(t); osc.stop(t+.35);
  }catch(e){}
}

// Geamăt de plăcere — ton cald, glissando ascendent, vibrato
function soundPleasure(){
  const ctx=getAudio();
  const count=Math.min(B.creatures.size,6);
  [...B.creatures.entries()].filter(([,c])=>c.status==='alive').slice(0,count).forEach(([,c],i)=>{
    setTimeout(()=>{
      const h=c.genome.traits.hue;
      const baseFreq=120+h*0.8; // fiecare amobă la frecvența ei
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      const vibrato=ctx.createOscillator();
      const vibratoGain=ctx.createGain();

      vibrato.frequency.value=5+Math.random()*2;
      vibratoGain.gain.value=4;
      vibrato.connect(vibratoGain);
      vibratoGain.connect(osc.frequency);

      osc.type='sine';
      osc.frequency.setValueAtTime(baseFreq,ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(baseFreq*1.35,ctx.currentTime+0.6);
      osc.frequency.linearRampToValueAtTime(baseFreq*1.2,ctx.currentTime+1.2);

      gain.gain.setValueAtTime(0,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12,ctx.currentTime+0.15);
      gain.gain.linearRampToValueAtTime(0.08,ctx.currentTime+0.8);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.4);

      osc.connect(gain); gain.connect(ctx.destination);
      vibrato.start(ctx.currentTime); osc.start(ctx.currentTime);
      vibrato.stop(ctx.currentTime+1.4); osc.stop(ctx.currentTime+1.4);
    }, i*120+Math.random()*80);
  });
}

// Chităit de frică — oscilator rapid, frecvență înaltă neregulată
function soundFear(){
  const ctx=getAudio();
  const count=Math.min(B.creatures.size,6);
  [...B.creatures.entries()].filter(([,c])=>c.status==='alive').slice(0,count).forEach(([,c],i)=>{
    setTimeout(()=>{
      const baseFreq=800+Math.random()*600;
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      const dist=ctx.createWaveShaper();

      // distorsie ușoară pentru chităit
      const curve=new Float32Array(256);
      for(let j=0;j<256;j++){const x=j*2/256-1; curve[j]=x*(Math.abs(x)+0.3)/(x*x+0.3+1);}
      dist.curve=curve;

      osc.type='sawtooth';
      osc.frequency.setValueAtTime(baseFreq,ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(baseFreq*0.4,ctx.currentTime+0.08);
      osc.frequency.linearRampToValueAtTime(baseFreq*1.2,ctx.currentTime+0.16);
      osc.frequency.linearRampToValueAtTime(baseFreq*0.3,ctx.currentTime+0.28);
      osc.frequency.linearRampToValueAtTime(baseFreq*0.8,ctx.currentTime+0.4);

      gain.gain.setValueAtTime(0.13,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.09,ctx.currentTime+0.2);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5);

      osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.5);
    }, i*90+Math.random()*60);
  });
}
const FX = document.getElementById('fx-canvas');
const CTX = FX.getContext('2d');
let fxParticles = [];

function resizeFX(){FX.width=innerWidth;FX.height=innerHeight;}

function fxLoop(){
  CTX.clearRect(0,0,FX.width,FX.height);
  fxParticles = fxParticles.filter(p => p.life > 0);
  fxParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= p.drag; p.vy *= p.drag;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;
    const a = Math.max(0, p.life);
    CTX.save();
    CTX.globalAlpha = a;
    CTX.translate(p.x, p.y);
    CTX.rotate(p.rotation);
    if (p.type === 'corn') {
      // Boabă de porumb — elipsă galbenă
      CTX.fillStyle = p.color;
      CTX.beginPath();
      CTX.ellipse(0, 0, p.rx, p.ry, 0, 0, Math.PI*2);
      CTX.fill();
      // luciu
      CTX.fillStyle = 'rgba(255,255,200,0.35)';
      CTX.beginPath();
      CTX.ellipse(-p.rx*.25, -p.ry*.3, p.rx*.3, p.ry*.2, -0.4, 0, Math.PI*2);
      CTX.fill();
    } else if (p.type === 'blood') {
      // Spirală de sânge
      CTX.strokeStyle = p.color;
      CTX.lineWidth = p.lw;
      CTX.lineCap = 'round';
      CTX.beginPath();
      for (let i = 0; i < p.turns * Math.PI * 2; i += 0.15) {
        const r = p.r0 * (1 - i / (p.turns * Math.PI * 2));
        const sx = Math.cos(i + p.phase) * r;
        const sy = Math.sin(i + p.phase) * r;
        i === 0 ? CTX.moveTo(sx, sy) : CTX.lineTo(sx, sy);
      }
      CTX.stroke();
      // Picătură la capăt
      CTX.fillStyle = p.color;
      CTX.beginPath();
      CTX.arc(0, 0, p.lw * 1.2, 0, Math.PI*2);
      CTX.fill();
    }
    CTX.restore();
  });
  requestAnimationFrame(fxLoop);
}
requestAnimationFrame(fxLoop);

function buildChildMap(){
  const children=new Map(),roots=[];
  B.creatures.forEach((c,id)=>{
    const pid=c.genome.parentIds?.[0];
    if(!pid||!B.creatures.has(pid)){roots.push(id);}
    else{if(!children.has(pid))children.set(pid,[]);children.get(pid).push(id);}
  });
  // sort roots by num
  roots.sort((a,b)=>B.creatures.get(a).genome.num-B.creatures.get(b).genome.num);
  return{roots,children};
}

function renderNode(id,children,depth,list){
  const c=B.creatures.get(id);if(!c)return;
  const kids=(children.get(id)||[]).sort((a,b)=>B.creatures.get(a).genome.num-B.creatures.get(b).genome.num);
  const hasKids=kids.length>0;
  const isExpanded=expanded.has(id);

  const row=document.createElement('div');row.className='tree-row';
  row.style.marginLeft=(depth*14)+'px';

  const tog=document.createElement('span');tog.className='tree-tog';
  if(hasKids){
    tog.textContent=isExpanded?'▾':'▸';
    tog.addEventListener('click',e=>{
      e.stopPropagation();
      if(expanded.has(id))expanded.delete(id);else expanded.add(id);
      render();
    });
  } else {tog.textContent='·';}

  const card=document.createElement('div');
  card.className=`ccard ${c.status}${id===B.selected?' selected':''}`;
  card.style.setProperty('--chue',c.genome.traits.hue);
  card.innerHTML=`<div class="cname">${c.genome.name}</div>
    <div class="cmeta">${c.genome.personnummer}</div>
    <div class="cstatus ${c.status==='alive'?'alive':'dead'}">${c.status==='alive'?`${c.childCount}/4`:'☠'}</div>`;
  card.addEventListener('click',()=>selectAndFocus(id));

  row.appendChild(tog);row.appendChild(card);list.appendChild(row);
  if(hasKids&&isExpanded)kids.forEach(kid=>renderNode(kid,children,depth+1,list));
}

function drift(c){
  const margin=14;
  const isSelected=(B.selected===c.genome.id);
  const unitW=AMSIZE+(isSelected?LOG_W+10:0);
  c.x+=c.vx;c.y+=c.vy;
  if(c.x<margin+AMSIZE/2){c.x=margin+AMSIZE/2;c.vx=Math.abs(c.vx);}
  if(c.x-AMSIZE/2+unitW>lakeW-margin){c.x=lakeW-margin-unitW+AMSIZE/2;c.vx=-Math.abs(c.vx);}
  if(c.y<margin+AMSIZE/2){c.y=margin+AMSIZE/2;c.vy=Math.abs(c.vy);}
  if(c.y+AMSIZE/2>lakeH-margin){c.y=lakeH-margin-AMSIZE/2;c.vy=-Math.abs(c.vy);}
  c.el.style.transform=`translate(${Math.round(c.x-AMSIZE/2)}px,${Math.round(c.y-AMSIZE/2)}px)`;
}

// ── Predator/Prey ─────────────────────────────────────────
const PREDATOR_RANGE = 1.4; // ori AMSIZE
const PREDATOR_COOLDOWN = 12000; // ms între mese
const predatorCooldowns = new Map();

function checkPredation(){
  const alive=[...B.creatures.entries()].filter(([,c])=>c.status==='alive');
  for(const [id1,c1] of alive){
    // Poate fi prădător doar dacă are fagocitoză
    if(!c1.genome.mutations.includes('fagocitoză'))continue;
    if(predatorCooldowns.has(id1)&&Date.now()-predatorCooldowns.get(id1)<PREDATOR_COOLDOWN)continue;
    for(const [id2,c2] of alive){
      if(id1===id2)continue;
      const dx=c1.x-c2.x,dy=c1.y-c2.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<AMSIZE*PREDATOR_RANGE){
        // Prădătorul e mai mare sau mai venerabil
        if(c1.genome.traits.size>=c2.genome.traits.size*.85||c1.genome.generation<c2.genome.generation){
          devour(id1,id2);
          predatorCooldowns.set(id1,Date.now());
          break;
        }
      }
    }
  }
}

function devour(predId,preyId){
  const pred=B.creatures.get(predId),prey=B.creatures.get(preyId);
  if(!pred||!prey)return;
  prey.el.classList.add('being-devoured');
  addEntry(predId,`⬤ a fagocitat ${prey.genome.name}. Energie absorbită.`,'event');
  addStimuli(predId,8);
  // Spawn particule de consum
  spawnDevourFX(prey.x,prey.y,prey.genome.traits.hue);
  setTimeout(()=>{fossilize(preyId);},800);
}

function spawnDevourFX(x,y,hue){
  const lakeRect=LAKE.getBoundingClientRect();
  const ax=lakeRect.left+x,ay=lakeRect.top+y;
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2;
    fxParticles.push({type:'corn',x:ax,y:ay,
      vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),
      gravity:0.1,drag:0.96,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.2,
      rx:3+Math.random()*3,ry:2+Math.random()*2,
      color:`hsla(${hue},60%,60%,0.9)`,life:1,decay:0.02+Math.random()*0.02});
  }
}

// ── Quorum sensing ────────────────────────────────────────
const QUORUM_RANGE = 1.8; // ori AMSIZE
const QUORUM_MIN   = 3;   // nr minim de vecini

function checkQuorum(){
  const alive=[...B.creatures.entries()].filter(([,c])=>c.status==='alive');
  alive.forEach(([id,c])=>{
    const neighbors=alive.filter(([oid,oc])=>{
      if(oid===id)return false;
      const dx=c.x-oc.x,dy=c.y-oc.y;
      return Math.sqrt(dx*dx+dy*dy)<AMSIZE*QUORUM_RANGE;
    });
    const inQuorum=neighbors.length>=QUORUM_MIN-1;
    c.el.classList.toggle('quorum',inQuorum);
    if(inQuorum&&!c.inQuorum){
      c.inQuorum=true;
      addEntry(id,'◈ quorum atins — rezonanță colectivă.','event');
      addStimuli(id,2);
      // Schimb de mutații cu vecinii
      neighbors.forEach(([,nc])=>{
        const theirMut=nc.genome.mutations.filter(m=>!c.genome.mutations.includes(m));
        if(theirMut.length>0&&Math.random()<.35){
          const shared=theirMut[Math.floor(Math.random()*theirMut.length)];
          c.genome.mutations.push(shared);
          addEntry(id,`◈ mutație preluată prin quorum: ${shared}`,'event');
        }
      });
    } else if(!inQuorum){c.inQuorum=false;}
  });
}

function animate(ts){
  B.creatures.forEach(c=>{
    if(c.status!=='alive'||!c.s?.body)return;
    const T=ts*.001*(.4+c.genome.traits.metabolism*.5)+c.phase;
    updateBlob(c,T);drift(c);
  });
  drawTrails();
  // Predare + quorum la interval
  if(!animate._t||ts-animate._t>2000){
    animate._t=ts;
    checkPredation();
    checkQuorum();
  }
  requestAnimationFrame(animate);
}

    const stateScript=`<script id="__biostate__">window.__BIOSTATE__=${JSON.stringify(exportState())};<\/script>`;
    const finalHtml=html.replace(/<script id="__biostate__">[\s\S]*?<\/script>/,'')
                        .replace('</head>',stateScript+'</head>');
    const writable=await fsFileHandle.createWritable();
    await writable.write(new Blob([finalHtml],{type:'text/html'}));
    await writable.close();
    btn.textContent='✓ SALVAT';btn.className='saved';
    setTimeout(()=>{btn.textContent='💾 AUTOSAVE ÎN FIȘIER';btn.className='';},3000);
  }catch(e){
    if(e.name==='AbortError')return;
    btn.textContent='✗ EROARE';btn.className='error';
    setTimeout(()=>{btn.textContent='💾 AUTOSAVE ÎN FIȘIER';btn.className='';},3000);
  }
}

function exportState(){
  return{
    nextNum:B.nextNum,maxGen:B.maxGen,nutrients,
    creatures:[...B.creatures.entries()].map(([id,c])=>({
      id,genome:c.genome,status:c.status,
      x:c.x,y:c.y,vx:c.vx,vy:c.vy,phase:c.phase,
      childCount:c.childCount,stimuli:c.stimuli,
      journal:c.journal||[]
    }))
  };
}

function buildLakeBg(){
  const svg=svgE('svg');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0';
  for(let i=0;i<55;i++){
    const c=svgE('circle');
    c.setAttribute('cx',(Math.random()*100)+'%');c.setAttribute('cy',(Math.random()*100)+'%');
    c.setAttribute('r',(.4+Math.random()*2.2).toFixed(1));
    c.setAttribute('fill',`rgba(100,160,180,${(.02+Math.random()*.07).toFixed(3)})`);
    svg.appendChild(c);}
  LAKE.insertBefore(svg,LAKE.firstChild);
}

// ── Reprogramare ──────────────────────────────────────────
async function reprogramBiotope(){
  const prompt  = document.getElementById('reprog-input').value.trim();
  const model   = document.getElementById('reprog-model').value;
  const btn     = document.getElementById('reprog-btn');
  const status  = document.getElementById('reprog-status');
  const preview = document.getElementById('reprog-preview');
  const bar     = document.getElementById('reprog-bar');
  const barFill = document.getElementById('reprog-bar-fill');

  if(!prompt){setStatus('err','⚠ Scrie o instrucțiune.');return;}
  const key=localStorage.getItem('ant_key');
  if(!key){setStatus('err','⚠ Nicio cheie API.');return;}

  btn.disabled=true;preview.style.display='none';
  bar.style.display='block';barFill.style.width='8%';
  setStatus('working','⏳ Analizez codul...');

  let src=document.documentElement.outerHTML;
  src=src.replace(/<script id="__biostate__">[\s\S]*?<\/script>/i,'');

  // Extragem doar CSS + primele funcții JS relevante (max ~8000 chars)
  const cssMatch=src.match(/<style>([\s\S]*?)<\/style>/);
  const css=cssMatch?cssMatch[1].slice(0,4000):'';
  // JS — primele 4000 chars după <script>
  const jsMatch=src.match(/<script[^>]*>([\s\S]*)/);
  const js=jsMatch?jsMatch[1].slice(0,4000):'';
  const context=`CSS:\n${css}\n\nJS (fragment):\n${js}`;

  const SYSTEM=`Ești expert în HTML/CSS/JavaScript.
Primești un fragment din codul sursă al unui fișier HTML.
Returnează DOAR un JSON cu patch-ul necesar, fără explicații, fără markdown:
{"find":"textul exact de găsit în sursă","replace":"textul nou cu care se înlocuiește"}
"find" trebuie să fie un string UNIC în fișier (minim 30 caractere context).
Returnează DOAR JSON-ul, nimic altceva.`;

  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),60000);

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model,
        max_tokens:1500,
        system:SYSTEM,
        messages:[{role:'user',content:`Fragment cod:\n\n${context}\n\n---\nModificare: ${prompt}`}]
      })
    });

    clearTimeout(timeout);
    barFill.style.width='60%';

    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      throw new Error(`API ${r.status}: ${err?.error?.message??'eroare'}`);
    }

    const data=await r.json();
    let raw=(data.content?.[0]?.text??'').trim();

    // Extrage JSON dacă e învelit în markdown
    const jMatch=raw.match(/\{[\s\S]*\}/);
    if(!jMatch) throw new Error('Răspuns neașteptat. Reformulează instrucțiunea.');
    const patch=JSON.parse(jMatch[0]);

    if(!patch.find||!patch.replace) throw new Error('Patch incomplet. Încearcă altă formulare.');
    if(!src.includes(patch.find)) throw new Error(`Nu găsesc în cod: "${patch.find.slice(0,40)}…"`);

    barFill.style.width='85%';

    // Aplică patch
    const newHtml=src.replace(patch.find, patch.replace);
    barFill.style.width='100%';
    setStatus('working','💾 Salvez...');

    try{
      if(!fsFileHandle){
        fsFileHandle=await window.showSaveFilePicker({
          suggestedName:'biotope.html',
          types:[{description:'HTML',accept:{'text/html':['.html']}}]
        });
      }
      const w=await fsFileHandle.createWritable();
      await w.write(new Blob([newHtml],{type:'text/html'}));
      await w.close();
      setStatus('ok','✓ Aplicat! Se reîncarcă...');
      setTimeout(()=>location.reload(),700);
    }catch(e){
      if(e.name==='AbortError'){resetReprog();return;}
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([newHtml],{type:'text/html'}));
      a.download='biotope_nou.html';a.click();
      setStatus('ok','✓ Descărcat ca biotope_nou.html');
      resetReprog();
    }

  }catch(e){
    clearTimeout(timeout);
    bar.style.display='none';barFill.style.width='0%';
    if(e.name==='AbortError') setStatus('err','✗ Timeout — încearcă din nou.');
    else setStatus('err','✗ '+e.message);
    btn.disabled=false;
  }

  function setStatus(cls,msg){status.className=cls;status.textContent=msg;}
  function resetReprog(){
    preview.style.display='none';bar.style.display='none';
    barFill.style.width='0%';btn.disabled=false;
    status.className='';status.textContent='';
  }
}
